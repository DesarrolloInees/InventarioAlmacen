<div class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300 font-sans min-h-screen flex flex-col">

  <nav class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 sticky top-0 z-50 transition-colors duration-300">
    <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        
        <div class="flex items-center">
          <a routerLink="/" class="flex-shrink-0 flex items-center mr-6 hover:opacity-80 transition">
            <img src="assets/logos/logoIneesFondoBlanco.png" alt="Logo-Inees"
                 class="h-10 w-auto object-contain invert dark:invert-0 transition-all duration-300">
          </a>

          <div class="hidden xl:flex space-x-1 items-center h-full">
            <a routerLink="/formulas/crear" routerLinkActive="text-orange-500 border-b-2 border-orange-500" class="px-3 py-2 text-sm font-medium hover:text-orange-500 transition-colors">
              <i class="fas fa-tools mr-1"></i> Nueva Fórmula
            </a>
            <a routerLink="/inventario" routerLinkActive="text-orange-500 border-b-2 border-orange-500" class="px-3 py-2 text-sm font-medium text-gray-500 dark:text-gray-300 hover:text-orange-500 transition-colors">
              <i class="fas fa-boxes mr-1"></i> Repuestos
            </a>
          </div>
        </div>

        <div class="flex items-center space-x-2">
          
          <div class="xl:hidden flex items-center">
            <button (click)="toggleMobileMenu()" class="p-2 rounded-md text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none">
              <i class="fas" [ngClass]="isMobileMenuOpen ? 'fa-times' : 'fa-bars'" class="text-xl"></i>
            </button>
          </div>

          <button (click)="toggleTheme()" type="button" class="text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none rounded-lg text-sm p-2.5 transition">
            <i *ngIf="isDarkMode" class="fas fa-sun text-lg"></i>
            <i *ngIf="!isDarkMode" class="fas fa-moon text-lg"></i>
          </button>

          <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 bg-gray-100 dark:bg-gray-800 rounded-full py-1.5 px-3">
              <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white">
                <i class="fas fa-user-circle text-xl"></i>
              </div>
              <div class="text-left hidden md:block">
                <p class="text-xs font-bold text-gray-800 dark:text-white leading-tight">
                  {{ usuario.nombre }}
                </p>
                <p class="text-[10px] text-gray-500 dark:text-gray-400 leading-tight">
                  {{ usuario.cargo }}
                </p>
              </div>
            </div>

            <button class="flex items-center gap-2 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-full transition text-sm font-medium">
              <i class="fas fa-sign-out-alt"></i>
              <span class="hidden sm:inline">Salir</span>
            </button>
          </div>

        </div>
      </div>
    </div>
  </nav>

  <div *ngIf="isMobileMenuOpen" class="xl:hidden bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
    <div class="px-2 pt-2 pb-3 space-y-1">
      <a routerLink="/formulas/crear" (click)="toggleMobileMenu()" class="block px-3 py-2 rounded-md text-base font-medium hover:bg-gray-100 dark:hover:bg-gray-700">
        <i class="fas fa-tools mr-2"></i> Nueva Fórmula
      </a>
      <a routerLink="/inventario" (click)="toggleMobileMenu()" class="block px-3 py-2 rounded-md text-base font-medium hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-300">
        <i class="fas fa-boxes mr-2"></i> Repuestos
      </a>
    </div>
  </div>

  <main class="flex-1 w-full max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 z-0">
    <router-outlet></router-outlet>
  </main>

  <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-4 mt-auto transition-colors duration-300">
    <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-500">
      &copy; 2026 I-Stock. Todos los derechos reservados.
    </div>
  </footer>

</div>
